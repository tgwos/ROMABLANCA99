<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

:root{
  --blue-dark:#0a1628;
  --blue-deep:#0f223d;
  --gold:#d4af37;
  --gold-light:#f8e7a1;
  --marble:#f5f2ea;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:"Cinzel", serif;
  background:linear-gradient(rgba(10,22,40,.97),rgba(10,22,40,.99));
  color:var(--gold-light);
}

/* BACK */
.back{
  position:fixed;
  top:calc(12px + env(safe-area-inset-top));
  left:12px;
  z-index:4000;
  padding:10px 16px;
  border-radius:16px;
  background:var(--blue-deep);
  border:3px double var(--gold);
  color:var(--gold-light);
  font-size:12px;
  letter-spacing:2px;
}

/* CONTAINER */
.app{
  padding:80px 16px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* GRID */
.products{
  width:100%;
  max-width:420px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

/* PRODUCT */
.product{
  height:200px;
  display:flex;
  flex-direction:column;
  gap:10px;
  cursor:pointer;
  transition:.2s;
}

.product:active{
  transform:scale(.95);
}

/* CARD */
.product-card{
  flex:1;
  border-radius:22px;
  background:var(--marble);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  border:4px double var(--gold);
  box-shadow:0 0 15px rgba(212,175,55,.25);
}

.product-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
.name{
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 8px;
  border-radius:14px;
  background:var(--gold);
  color:#000;
  font-weight:900;
  text-align:center;
  font-size:clamp(9px,3.5vw,12px);
  letter-spacing:1px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(10,22,40,.98);
  display:none;
  flex-direction:column;
  z-index:2000;
}

/* MEDIA */
.media-box{
  width:100%;
  max-width:420px;
  margin:20px auto 0;
  position:relative;
}

.media-box video,
.media-box img{
  width:100%;
  max-height:50vh;
  object-fit:contain;
}

/* ARROWS */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:54px;
  height:54px;
  background:var(--blue-deep);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  cursor:pointer;
  user-select:none;
  color:var(--gold-light);
  border:3px double var(--gold);
  box-shadow:0 0 12px rgba(212,175,55,.4);
}

.nav.left{ left:10px; }
.nav.right{ right:10px; }

/* PRICES */
.prices{
  width:100%;
  max-width:420px;
  margin:18px auto 0;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:12px;
  max-height:30vh;
  overflow-y:auto;
}

.price{
  background:var(--blue-deep);
  border-radius:16px;
  padding:14px;
  text-align:center;
  font-weight:800;
  border:3px double var(--gold);
  box-shadow:0 0 12px rgba(212,175,55,.25);
}

/* CONTACT */
.contact{
  position:sticky;
  bottom:0;
  width:100%;
  max-width:420px;
  margin:0 auto;
  padding:18px;
  background:var(--gold);
  color:#000;
  border-radius:20px 20px 0 0;
  font-weight:900;
  text-align:center;
  cursor:pointer;
  letter-spacing:2px;
}
</style>
