<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

:root{
  --blue-dark:#0a1628;
  --blue-deep:#0f223d;
  --gold:#d4af37;
  --gold-light:#f8e7a1;
  --marble:#f5f2ea;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:"Cinzel", serif;
  background:linear-gradient(rgba(10,22,40,.97),rgba(10,22,40,.99));
  color:var(--gold-light);
  overflow-x:hidden;
}

/* CONTAINER */
.container{
  padding:24px 16px 120px;
  width:100%;
  max-width:500px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.header{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  text-align:center;
}

.logo-video{
  width:38vw;
  height:38vw;
  max-width:160px;
  max-height:160px;
  border-radius:50%;
  border:6px double var(--gold);
  object-fit:cover;
  box-shadow:0 0 25px rgba(212,175,55,.6);
}

.panel{
  width:100%;
  max-width:420px;
  background:var(--blue-deep);
  border-radius:22px;
  padding:22px;
  border:5px double var(--gold);
  position:relative;
  box-shadow:0 0 25px rgba(212,175,55,.4);
}

.panel::before{
  content:" SPQR ";
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  background:var(--blue-dark);
  padding:4px 16px;
  border:3px solid var(--gold);
  border-radius:10px;
  letter-spacing:3px;
  font-size:12px;
}

/* GRIGLIA 2x2 */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.card-catalog{
  grid-column:1/-1;
  height:160px;
  border-radius:18px;
  cursor:pointer;
  background:
    linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.6)),
    url("https://tgwos.github.io/ROMABLANCA99/foto1.jpg")
    center/cover no-repeat;
  border:4px double var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
}

.card-catalog span{
  font-size:22px;
  letter-spacing:6px;
}

/* BOTTONI */
.small-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.card-small{
  width:100%;
  height:120px;
  border-radius:16px;
  background:var(--marble);
  border:4px double var(--gold);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card-small img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.small-label{
  padding:6px 14px;
  border-radius:10px;
  font-size:11px;
  letter-spacing:2px;
  background:var(--gold);
  color:#000;
}

/* POPUP */
.popup-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.popup-overlay.show{display:flex;}

.popup-box{
  min-width:240px;
  padding:20px;
  border-radius:16px;
  background:var(--marble);
  border:4px double var(--gold);
  text-align:center;
  color:#000;
}

.popup-title{
  font-size:14px;
  letter-spacing:3px;
}

.popup-link{
  display:block;
  padding-top:8px;
  margin-top:8px;
  font-size:13px;
  text-decoration:none;
  color:#102542;
}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;
  bottom:12px;
  left:12px;
  right:12px;
  height:65px;
  background:var(--blue-deep);
  border-radius:20px;
  border:4px double var(--gold);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:20;
}

.bottom-bar svg{
  width:22px;
  height:22px;
  fill:var(--gold);
  stroke:var(--gold);
}
/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  overflow:hidden;
}

.loader-content{
  position:relative;
  z-index:1;
  text-align:center;
}

.loader-video{
  width:180px;
  height:180px;
  border-radius:50%;
  border:6px double var(--gold);
  object-fit:cover;
  box-shadow:0 0 30px rgba(212,175,55,.8);
}

#loader-text{
  margin-top:20px;
  font-size:26px;
  letter-spacing:6px;
  color:var(--gold);
}
</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // Telegram WebApp
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  }

  // Loader
  window.addEventListener("load", function () {
    setTimeout(function () {
      const loader = document.getElementById("loader");
      if (loader) {
        loader.style.display = "none";
      }
    }, 2000);
  });

  const popup = document.getElementById("popup");
  const popupTitle = document.getElementById("popup-title");

  window.openPopup = function (title, text1, url1, text2, url2, text3, url3) {

    popupTitle.innerText = title;

    const link1 = document.getElementById("popup-link-1");
    const link2 = document.getElementById("popup-link-2");
    const link3 = document.getElementById("popup-link-3");

    link1.style.display = "none";
    link2.style.display = "none";
    link3.style.display = "none";

    if (text1 && url1) {
      link1.innerText = text1;
      link1.onclick = () => window.open(url1, "_blank");
      link1.style.display = "block";
    }

    if (text2 && url2) {
      link2.innerText = text2;
      link2.onclick = () => window.open(url2, "_blank");
      link2.style.display = "block";
    }

    if (text3 && url3) {
      link3.innerText = text3;
      link3.onclick = () => window.open(url3, "_blank");
      link3.style.display = "block";
    }

    popup.classList.add("show");
  };

  window.closePopup = function () {
    popup.classList.remove("show");
  };

});
</script>
