<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ROMA BLANCA 99 – Catalogo</title>

<script src="https://telegram.org/js/telegram-web-app.js?v=6"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

:root{
  --blue-dark:#0a1628;
  --blue-deep:#0f223d;
  --gold:#d4af37;
  --gold-light:#f8e7a1;
  --marble:#f5f2ea;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:"Cinzel", serif;
  background:linear-gradient(rgba(10,22,40,.97),rgba(10,22,40,.99));
  color:var(--gold-light);
  overflow-x:hidden;
}

/* COLONNE */
.column{
  position:fixed;
  top:0;
  bottom:0;
  width:60px;
  background:linear-gradient(to right,#cfcac0,#f5f2ea,#cfcac0);
  z-index:-1;
}
.column.left{left:0;}
.column.right{right:0;}

/* BACK BUTTON */
.back{
  position:fixed;
  top:calc(14px + env(safe-area-inset-top));
  left:70px;
  z-index:10;
  padding:10px 16px;
  border-radius:14px;
  background:var(--blue-deep);
  border:3px double var(--gold);
  color:var(--gold-light);
  font-size:12px;
  letter-spacing:2px;
}

/* CONTAINER */
.container{
  padding:90px 70px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

/* HEADER */
.bubble{
  width:100%;
  max-width:420px;
  background:var(--blue-deep);
  border-radius:26px;
  padding:26px;
  text-align:center;
  font-size:20px;
  letter-spacing:5px;
  border:5px double var(--gold);
  box-shadow:0 0 25px rgba(212,175,55,.4);
}

.bubble::after{
  content:"Scegli una categoria";
  display:block;
  margin-top:10px;
  font-size:11px;
  letter-spacing:2px;
  opacity:.8;
}

/* PANEL */
.panel{
  width:100%;
  max-width:420px;
  background:var(--blue-deep);
  border-radius:30px;
  padding:20px;
  border:5px double var(--gold);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

/* ITEM STILE INDEX */
.item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.stock-card{
  width:100%;
  height:120px;
  border-radius:18px;
  background:var(--marble);
  border:4px double var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
}

.stock-card img{
  width:80%;
  height:80%;
  object-fit:cover;
  border-radius:12px;
}

.item-title{
  padding:6px 14px;
  border-radius:12px;
  font-size:11px;
  letter-spacing:2px;
  background:var(--gold);
  color:#000;
  text-align:center;
  width:100%;
}
</style>
</head>

<body>

<div class="column left"></div>
<div class="column right"></div>

<div class="back" onclick="goBack()">⬅ BACK</div>

<div class="container">

  <div class="bubble">🦅 SPQR CATALOGO 🦅</div>

  <div class="panel">
    <div class="grid">

      <div class="item" onclick="openStock('stock-1.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">BLUE MAGIC PATRON</div>
      </div>

      <div class="item" onclick="openStock('stock-2.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">DRY</div>
      </div>

      <div class="item" onclick="openStock('stock-3.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">FROZEN / STATIC</div>
      </div>

      <div class="item" onclick="openStock('stock-4.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">COCAINA</div>
      </div>

      <div class="item" onclick="openStock('stock-5.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">SINTETICI</div>
      </div>

      <div class="item" onclick="openStock('stock-6.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ITALIANFARM/5807439531530194108.jpg">
        </div>
        <div class="item-title">PROMO</div>
      </div>

    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.BackButton.show();
tg.BackButton.onClick(goBack);

function goBack(){
  tg.BackButton.hide();
  location.href="index.html";
}

function openStock(p){
  tg.BackButton.hide();
  location.assign(p);
}
</script>

</body>
</html>
