<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ROMA BLANCA 93 – Catalogo</title>

<script src="https://telegram.org/js/telegram-web-app.js?v=6"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

:root{
  --blue-dark:#0a1628;
  --blue-deep:#0f223d;
  --gold:#d4af37;
  --gold-light:#f8e7a1;
  --marble:#f5f2ea;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:"Cinzel", serif;
  background:linear-gradient(rgba(10,22,40,.97),rgba(10,22,40,.99));
  color:var(--gold-light);
}

/* BACK BUTTON */
.back{
  position:fixed;
  top:calc(14px + env(safe-area-inset-top));
  left:16px;
  z-index:20;
  padding:10px 18px;
  border-radius:14px;
  background:var(--blue-deep);
  border:3px double var(--gold);
  font-size:12px;
  letter-spacing:2px;
  transition:0.2s;
}

.back:active{
  transform:scale(.92);
}

/* CONTAINER */
.container{
  padding:100px 16px 50px;
  max-width:500px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
}

/* HEADER */
.bubble{
  width:100%;
  max-width:420px;
  background:var(--blue-deep);
  border-radius:28px;
  padding:28px;
  text-align:center;
  font-size:22px;
  letter-spacing:5px;
  border:5px double var(--gold);
  box-shadow:0 0 25px rgba(212,175,55,.4);
}

.bubble small{
  display:block;
  margin-top:10px;
  font-size:11px;
  letter-spacing:2px;
  opacity:.8;
}

/* PANEL */
.panel{
  width:100%;
  max-width:420px;
  background:var(--blue-deep);
  border-radius:30px;
  padding:22px;
  border:5px double var(--gold);
}

/* GRIGLIA IDENTICA A INDEX */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

/* ITEM */
.item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:0.2s;
}

.item:active{
  transform:scale(.95);
}

/* CARD IDENTICA A INDEX */
.stock-card{
  width:100%;
  height:130px;
  border-radius:18px;
  background:var(--marble);
  border:4px double var(--gold);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px rgba(212,175,55,.25);
}

/* LOGO PERFETTO DENTRO IL BOTTONE */
.stock-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TITOLO */
.item-title{
  padding:8px 14px;
  border-radius:14px;
  font-size:11px;
  letter-spacing:2px;
  background:var(--gold);
  color:#000;
  text-align:center;
  width:100%;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ BACK</div>

<div class="container">

  <div class="bubble">
    🏴‍☠️ ROMA BLANCA 93 🏴‍☠️
    <small>Scegli una categoria</small>
  </div>

  <div class="panel">
    <div class="grid">

      <div class="item" onclick="openStock('stock-1.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ROMABLANCA99/foto1.jpg">
        </div>
        <div class="item-title">COCAINA</div>
      </div>

      <div class="item" onclick="openStock('stock-2.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ROMABLANCA99/foto1.jpg">
        </div>
        <div class="item-title">DRY VARIE FARM</div>
      </div>

      <div class="item" onclick="openStock('stock-3.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ROMABLANCA99/foto1.jpg">
        </div>
        <div class="item-title">FROZEN MOE FARM</div>
      </div>

      <div class="item" onclick="openStock('stock-4.html')">
        <div class="stock-card">
          <img src="https://tgwos.github.io/ROMABLANCA99/foto1.jpg">
        </div>
        <div class="item-title">ERBA CALI USA</div>
      </div>

    </div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.BackButton.show();
tg.BackButton.onClick(goBack);

function goBack(){
  tg.BackButton.hide();
  location.href="index.html";
}

function openStock(page){
  tg.BackButton.hide();
  location.assign(page);
}
</script>

</body>
</html>
